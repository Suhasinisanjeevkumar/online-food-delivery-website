{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card slide-up">
        <div class="auth-header">
            <h1>Create Account</h1>
            <p>Join FoodExpress and start ordering</p>
        </div>
        
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" required class="form-input" placeholder="Choose a username">
            </div>
            
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" required class="form-input" placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label class="form-label">Phone (optional)</label>
                <input type="tel" name="phone" class="form-input" placeholder="Enter your phone number">
            </div>
            
            <div class="form-group">
                <label class="form-label">Password (6-12 characters)</label>
                <input type="password" name="password" required class="form-input" placeholder="Create a password">
            </div>
            
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" required class="form-input" placeholder="Confirm your password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
        </form>
        
        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
